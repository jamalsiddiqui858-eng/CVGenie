<!DOCTYPE html>
<html>
<head>
    <title>Login - CVGenie</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body class="space-bg">

<div class="glass-box">

    <!-- LOGO -->
    <div class="top">
        <img src="{{ url_for('static', filename='images/logo.png') }}">
        <h2>CVGenie</h2>
        <p>Build Your Resume in Minutes</p>
    </div>

    <!-- TITLE -->
    <h1 style="margin-top:10px;">Login</h1>

    <!-- FORM -->
    <form action="/send-otp" method="POST">

        <div class="input-field">
            <input type="email" name="email" placeholder="Enter your email" required>
        </div>

        <button class="otp-btn">Send OTP</button>

    </form>

    <p class="info">OTP will be sent to your email</p>

    <p class="signup">
        Don’t have an account? 
        <a href="/signup"><span>Sign Up →</span></a>
    </p>

</div>

</body>
</html>
